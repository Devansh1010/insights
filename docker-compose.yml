services:
  nextjs_app:
    build: .
    image: blogger-insights-article
    restart: always
    env_file:
      - .env
    networks:
      - paperclip-rfqj_default  # This is the "hallway" name you found
    labels:
      - "traefik.enable=true"
      # This tells the EXISTING Traefik to watch for your domain name
      - "traefik.http.routers.blogger-app.rule=Host(`insightsarticle.in`) || Host(`www.insightsarticle.in`)"
      - "traefik.http.services.blogger-app.loadbalancer.server.port=3000"

networks:
  paperclip-rfqj_default:
    external: true 