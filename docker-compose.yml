services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - web-gateway

  insights-article:
    build: .
    restart: always
    
    env_file:
      - .env
    networks:
      - web-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs.rule=Host(`insightsarticle.in`) || Host(`www.insightsarticle.in`)"
      - "traefik.http.services.nextjs.loadbalancer.server.port=3000"

volumes:
  next_image_cache:

networks:
  web-gateway:
    driver: bridge