version: '3.8'
services:
  mongodb:
    image: mongo
    ports: 
      - "27017:27017"
    env_file:
      - .env.local
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_DB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_DB_PASSWORD}
    networks:
      - internal-network
  next-insights:
    build: .
    restart: always 
    depends_on:
      - mongodb
    networks:
      - internal-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.next-insights.rule=Host(`insightsarticle.in`)"
      - "traefik.http.routers.next-insights.entrypoints=websecure" # For HTTPS
      - "traefik.http.routers.next-insights.tls.certresolver=myresolver" # For Auto-SSL
      - "traefik.http.services.next-insights.loadbalancer.server.port=3000"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongodb:27017/next_db?authSource=admin
networks:
  internal-network:
    driver: bridge
  proxy:
    external: true      # This tells Docker the 'proxy' network already exists
volumes:
  mongo-data: