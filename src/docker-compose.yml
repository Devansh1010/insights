
services:
  mongodb:
    image: mongo:7
    container_name: blogger_mongodb
    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongodb_data:/data/db

  valkey:
    image: valkey/valkey:7
    container_name: blogger_valkey
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - valkey_data:/data

volumes:
  mongodb_data:
  valkey_data: